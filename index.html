                subtitle: "Forecasting vs Early Warning",
                q: "可以準確預報地震發生的時間嗎？",
                explain: "目前尚無可靠方法可精準預報地震發生的確切時間。地震預警是基於已發生震央快速檢測與波到達時間差，提供秒到數十秒的反應時間。",
                visual: ``,
                quiz: "預報和預警在應用策略上有何不同？",
                ans: "預報用於長期風險規劃；預警用於短期緊急反應（關閉閥門、停電梯等）。"
            },
            {
                title: "10. 核武監測科學",
                subtitle: "Seismology for Nuclear Monitoring",
                q: "地震學如何協助偵測地下核試？",
                explain: "人工爆震與地震在頻譜上有差異；結合多模態（地震、空氣聲、重力等）和陣列分析可提高識別能力，並透過地震矩與震源深度判別是否為爆炸性事件。",
                visual: ``,
                quiz: "偵測地下爆炸時，最重要的訊號特徵為何？",
                ans: "短時窗內高頻能量比、震源深度淺、以及與地震型態不同的輻射模式。"
            }
        ];

        // === 在頁面上渲染 topics（保留原始結構風格） ===
        const container = document.getElementById('topics-container');

        topics.forEach((t, idx) => {
            const section = document.createElement('section');
            section.id = `topic-${idx}`;
            section.className = 'bg-slate-950 border border-slate-800 rounded-xl p-6';

            section.innerHTML = `
                <header class="flex items-start justify-between">
                    <div>
                        <h2 class="text-lg md:text-xl font-extrabold text-slate-100">${t.title}</h2>
                        <p class="text-sm text-slate-400 mt-1">${t.subtitle || ''}</p>
                    </div>
                    <div class="text-sm text-slate-400">${idx + 1}</div>
                </header>

                <div class="topic-body mt-4 space-y-4 text-sm text-slate-200">
                    <div class="bg-slate-900 border border-slate-800 rounded-md p-4">
                        <div class="font-semibold text-blue-300 mb-2">引導問題：</div>
                        <div class="text-slate-200">${t.q || ''}</div>
                    </div>

                    <div class="bg-slate-900 border border-slate-800 rounded-md p-4">
                        <div class="font-semibold text-yellow-300 mb-2">說明：</div>
                        <div class="text-slate-200">${t.explain || ''}</div>
                    </div>

                    ${t.visual || ''}

                    <div class="bg-slate-900 border border-slate-800 rounded-md p-4">
                        <div class="font-semibold text-green-300 mb-2">小測驗：</div>
                        <div class="text-slate-200 mb-3">${t.quiz || ''}</div>
                        <button class="show-answer-btn bg-blue-700/30 text-blue-200 px-3 py-1 rounded">顯示答案</button>
                        <div class="quiz-answer mt-3 p-3 bg-slate-800 rounded" aria-hidden="true">${t.ans || ''}</div>
                    </div>
                </div>
            `;

            container.appendChild(section);
        });

        // 互動：顯示答案 & 側欄導覽 active 狀態
        document.querySelectorAll('.show-answer-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const ans = btn.parentElement.querySelector('.quiz-answer');
                const shown = ans.classList.toggle('show');
                ans.style.display = shown ? 'block' : 'none';
                ans.setAttribute('aria-hidden', !shown);
                btn.textContent = shown ? '隱藏答案' : '顯示答案';
            });
        });

        // 側欄連結滾動與 active 樣式
        document.querySelectorAll('aside nav a.nav-link').forEach((a) => {
            a.addEventListener('click', (ev) => {
                ev.preventDefault();
                const targetId = a.getAttribute('href').slice(1);
                const el = document.getElementById(targetId);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    document.querySelectorAll('aside nav a.nav-link').forEach(n=>n.classList.remove('active'));
                    a.classList.add('active');
                }
            });
        });

        // 當滾動時更新側邊目錄 active（簡單版）
        window.addEventListener('scroll', () => {
            const sections = Array.from(document.querySelectorAll('main section'));
            let current = sections.find(s => {
                const rect = s.getBoundingClientRect();
                return rect.top <= 120 && rect.bottom > 120;
            });
            document.querySelectorAll('aside nav a.nav-link').forEach(a=>a.classList.remove('active'));
            if (current) {
                const id = current.id;
                const link = document.querySelector(`aside nav a[href="#${id}"]`);
                if (link) link.classList.add('active');
            }
        });

    </script>
</body>
</html>
