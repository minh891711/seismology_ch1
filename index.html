<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地震學大師互動教室 | 深度理論專業版</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<script>
window.MathJax = {
tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
};
</script>

<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body {font-family:'Noto Sans TC',sans-serif;background:#020617;color:#e2e8f0}
.topic-content{transition:all .4s ease;max-height:0;opacity:0;overflow:hidden}
.topic-content.open{max-height:6000px;opacity:1;margin-top:20px}
</style>
</head>

<body class="p-10">

<h1 class="text-3xl font-black mb-10">地震學大師互動教室</h1>

<div id="topics-container"></div>

<script>

const topics = [

{
title:"4. 正向與反演問題",
q:"如何從雜亂波形解讀地下構造？",
explain:"地震學最重要的核心問題之一就是「反演」。",
visual:`

<div class="space-y-10">

<div class="bg-slate-900 p-6 rounded-xl border border-slate-700">
<h3 class="text-xl font-bold mb-4">模型化 (Modeling) 與誤差來源</h3>

<img src="https://raw.githubusercontent.com/minh891711/seismology_ch1/main/photos/1.1-3.png"
class="rounded-lg border border-slate-600 mb-6">

<div class="space-y-3 text-sm">

<b class="text-blue-400">1. 真實地球 vs. 數學模型</b>

<p>
真實地球的地層往往是彎曲、傾斜且高度異質的。
但為了讓數學方程式能求解，地震學家通常假設
地球由<strong>水平、均質層</strong>組成。
</p>

<b class="text-yellow-400">2. 誤差來源</b>

<ul class="list-disc ml-6">
<li><b>隨機誤差</b>：儀器雜訊、測量誤差，可透過統計平均降低</li>
<li><b>系統誤差</b>：模型與現實不一致，例如傾斜地層被假設為水平</li>
</ul>

<b class="text-red-400">3. 反演解讀風險</b>

<p>
如果模型過度簡化，我們可能將
「模型缺陷」誤認為「地球真實特徵」。
</p>

</div>
</div>


<div class="bg-slate-900 p-6 rounded-xl border border-slate-700">
<h3 class="text-xl font-bold mb-4">正向問題 vs 反演問題</h3>

<img src="https://raw.githubusercontent.com/minh891711/seismology_ch1/main/photos/1.1-4.png"
class="rounded-lg border border-slate-600 mb-6">

<div class="text-sm space-y-4">

<b class="text-blue-400">Forward Problem</b>

<p>
已知模型 → 預測地震數據。
透過波動方程式計算，
得到理論上的「合成地震圖」。
</p>

<b class="text-yellow-400">Inverse Problem</b>

<p>
已知數據 → 推算地下模型。
這就像偵探破案，
從有限證據推測地震來源與地下構造。
</p>

<b class="text-red-400">三大困難</b>

<ul class="list-disc ml-6">
<li>非唯一性 (Non-uniqueness)</li>
<li>資料分布不均</li>
<li>測量與模型誤差</li>
</ul>

</div>
</div>


<div class="bg-slate-900 p-6 rounded-xl border border-slate-700">
<h3 class="text-xl font-bold mb-4">模型與真實世界的落差</h3>

<img src="https://raw.githubusercontent.com/minh891711/seismology_ch1/main/photos/1.1-5.png"
class="rounded-lg border border-slate-600 mb-6">

<div class="text-sm space-y-3">

<p>
地震學中的模型永遠只是
<strong>真實地球的近似描述</strong>。
</p>

<ul class="list-disc ml-6">
<li>地球實際構造：複雜且不規則</li>
<li>模型：簡化為水平層</li>
</ul>

<p>
若模型太過簡化，
反演結果可能產生<strong>系統性偏差</strong>。
</p>

</div>
</div>


<div class="bg-slate-900 p-6 rounded-xl border border-slate-700">
<h3 class="text-xl font-bold mb-4">Modeling 與誤差再探討</h3>

<img src="https://raw.githubusercontent.com/minh891711/seismology_ch1/main/photos/1.2-3.png"
class="rounded-lg border border-slate-600 mb-6">

<div class="text-sm space-y-3">

<p>
模型化過程本質上是
<strong>現實 → 抽象</strong> 的轉換。
</p>

<ul class="list-disc ml-6">
<li>隨機誤差：資料測量雜訊</li>
<li>系統誤差：模型假設錯誤</li>
</ul>

<p>
若忽略模型限制，
可能會對地球結構做出錯誤解讀。
</p>

</div>
</div>

</div>
`
},

{
title:"6. 地震危害",
visual:`

<div class="bg-slate-900 p-6 rounded-xl border border-slate-700">

<h3 class="text-xl font-bold mb-4">地震波衰減差異</h3>

<img src="https://raw.githubusercontent.com/minh891711/seismology_ch1/main/photos/1.2-5.png"
class="rounded-lg border border-slate-600 mb-6">

<div class="text-sm space-y-3">

<p>
此圖比較<strong>美國東部與西部</strong>
地震波衰減差異。
</p>

<ul class="list-disc ml-6">
<li>西部：地殼破碎 → 能量衰減快</li>
<li>東部：岩石堅硬 → 波能傳播遠</li>
</ul>

<p>
因此東部規模6地震
可能產生與西部規模7
相近的地表加速度。
</p>

</div>
</div>
`
},

{
title:"7. 工程抗震",
visual:`

<div class="bg-slate-900 p-6 rounded-xl border border-slate-700">

<h3 class="text-xl font-bold mb-4">建築倒塌率與震度</h3>

<img src="https://raw.githubusercontent.com/minh891711/seismology_ch1/main/photos/1.2-6.png"
class="rounded-lg border border-slate-600 mb-6">

<div class="text-sm space-y-3">

<p>
圖表展示不同建築結構在
<strong>MMI震度</strong>下的倒塌率。
</p>

<ul class="list-disc ml-6">
<li>土坯與弱磚石：最脆弱</li>
<li>木構造：韌性較好</li>
<li>鋼筋混凝土：中等</li>
<li>抗震鋼筋混凝土：最安全</li>
</ul>

<p>
耐震設計能在強震下
大幅降低倒塌率。
</p>

</div>
</div>
`
}

];

const container=document.getElementById("topics-container");

topics.forEach((t,i)=>{

const block=document.createElement("div");

block.innerHTML=`

<div class="border border-slate-700 rounded-xl p-6 bg-slate-950">

<h2 class="text-xl font-bold">${t.title}</h2>

<p class="text-slate-400 mt-2">${t.q||""}</p>

<button onclick="toggle(${i})"
class="mt-4 px-4 py-2 bg-blue-600 rounded">
展開內容
</button>

<div id="c${i}" class="topic-content">

<p class="mt-4">${t.explain||""}</p>

${t.visual||""}

</div>

</div>
`;

container.appendChild(block);

});

function toggle(i){

const el=document.getElementById("c"+i);

el.classList.toggle("open");

}

</script>

</body>
</html>
