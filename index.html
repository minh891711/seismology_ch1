<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震學大師互動教室 | 彈性回跳理論與導覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- MathJax 支援 -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 主視覺動畫：P波與S波 */
        .wave-hero { position: relative; height: 160px; background: #0f172a; border-radius: 1rem; overflow: hidden; border: 1px solid #1e293b; }
        .p-wave-track { position: absolute; top: 30px; width: 100%; height: 40px; display: flex; align-items: center; }
        .s-wave-track { position: absolute; bottom: 30px; width: 100%; height: 40px; display: flex; align-items: center; }
        
        .p-particle { width: 8px; height: 30px; background: #60a5fa; margin-right: 12px; border-radius: 4px; animation: pAnim 2s infinite ease-in-out; }
        @keyframes pAnim { 
            0%, 100% { transform: translateX(0); background: #60a5fa; } 
            50% { transform: translateX(20px); background: #f87171; } 
        }

        .s-particle { width: 10px; height: 10px; background: #fbbf24; border-radius: 50%; position: absolute; animation: sAnim 3s infinite linear; }
        @keyframes sAnim {
            0% { left: -20px; transform: translateY(0); }
            25% { transform: translateY(-20px); }
            50% { transform: translateY(0); }
            75% { transform: translateY(20px); }
            100% { left: 105%; transform: translateY(0); }
        }

        /* 內容展開動畫 */
        .topic-content { transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out; max-height: 0; opacity: 0; overflow: hidden; }
        .topic-content.open { max-height: 5000px; opacity: 1; padding-top: 1.5rem; }
        
        .quiz-answer { display: none; }
        .quiz-answer.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-link.active { color: #60a5fa; border-left-color: #60a5fa; background: rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 antialiased selection:bg-blue-500/30 flex">

    <!-- 左側固定索引欄 -->
    <aside class="hidden lg:flex flex-col w-72 h-screen sticky top-0 bg-slate-950 border-r border-slate-800 p-6 overflow-y-auto no-scrollbar">
        <div class="mb-8">
            <h2 class="text-xl font-black text-slate-100">課程目錄</h2>
            <p class="text-xs text-slate-500 uppercase tracking-widest mt-1">Seismology Master</p>
        </div>
        <nav id="sidebar-nav" class="space-y-1 text-sm">
            <!-- 由 JS 動態生成 -->
        </nav>
    </aside>

    <!-- 右側主內容 -->
    <div class="flex-1 min-w-0">
        <header class="bg-slate-950/50 backdrop-blur-md sticky top-0 z-10 border-b border-slate-800 py-6 px-8 flex justify-between items-center">
            <h1 class="text-2xl md:text-3xl font-black text-slate-100 italic tracking-tighter">SEISMOLOGY <span class="text-blue-500 text-base not-italic font-normal ml-2">Chapter 1</span></h1>
            <div class="hidden sm:flex gap-4">
                <span class="text-[10px] bg-slate-800 text-slate-400 border border-slate-700 px-2 py-1 rounded">REF: REID (1906)</span>
                <span class="text-[10px] bg-blue-900/40 text-blue-400 border border-blue-800 px-2 py-1 rounded">INTERACTIVE DOC</span>
            </div>
        </header>

        <main class="max-w-4xl mx-auto p-6 md:p-12 space-y-12">
            
            <!-- 主視覺動畫區 (替換原本文字) -->
            <section class="space-y-4">
                <div class="wave-hero">
                    <div class="p-wave-track">
                        <span class="text-[10px] text-blue-500 font-bold ml-4 mr-8 uppercase">P-Wave (Compression)</span>
                        <div class="flex">
                            <div class="p-particle" style="animation-delay: 0.1s"></div>
                            <div class="p-particle" style="animation-delay: 0.2s"></div>
                            <div class="p-particle" style="animation-delay: 0.3s"></div>
                            <div class="p-particle" style="animation-delay: 0.4s"></div>
                            <div class="p-particle" style="animation-delay: 0.5s"></div>
                            <div class="p-particle" style="animation-delay: 0.6s"></div>
                        </div>
                    </div>
                    <div class="s-wave-track">
                        <span class="text-[10px] text-yellow-500 font-bold ml-4 mr-8 uppercase">S-Wave (Shear)</span>
                        <div class="s-particle" style="animation-delay: 0s"></div>
                        <div class="s-particle" style="animation-delay: 0.5s"></div>
                        <div class="s-particle" style="animation-delay: 1s"></div>
                    </div>
                </div>
                <p class="text-center text-xs text-slate-500 italic">模擬：P波的縱向壓縮感與S波的橫向剪力感</p>
            </section>

            <!-- 內容區 -->
            <div id="topics-container" class="space-y-6"></div>

        </main>

        <footer class="text-center py-12 text-slate-600 text-sm border-t border-slate-800">
            <p>Seismology Interactive Laboratory | Powered by Aki & Richards Theory</p>
        </footer>
    </div>

    <script>
        const topics = [
            {
                title: "1. 地震學定義與彈性回跳理論",
                subtitle: "Definition and Elastic Rebound Theory",
                q: "地震發生的一瞬間，地殼裡到底發生了什麼？",
                explain: "地震學不僅是研究震動，更是研究「彈性波」。根據 1906 年舊金山大地震後由 Harry Fielding Reid 提出的**彈性回跳理論 (Elastic Rebound Theory)**，地震是地殼累積應力後，瞬間「回彈」釋放能量的過程。",
                visual: `
                <div class="mt-8 space-y-8">
                    <!-- 地震學架構簡圖 -->
                    <div class="bg-slate-900 border border-slate-700 rounded-xl p-6">
                        <div class="flex flex-col items-center">
                            <img src="https://raw.githubusercontent.com/minh891711/seismology_ch1/main/photos/1.1-2.png" alt="Seismology concept diagram" class="w-full max-w-xl rounded-lg bg-white p-2">
                            <p class="text-xs text-slate-500 mt-3 font-mono tracking-tighter">FIG 1.1-1: SOURCE → MEDIUM → RECEIVER</p>
                        </div>
                    </div>

                    <!-- 彈性回跳理論 -->
                    <div class="bg-slate-900 border border-slate-700 rounded-xl p-6">
                        <h4 class="text-lg font-bold text-slate-100 mb-6 flex items-center gap-2">
                            <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
                            彈性回跳理論 (Elastic Rebound Theory)
                        </h4>
                        
                        <div class="flex flex-col items-center mb-8">
                            <img src="https://raw.githubusercontent.com/minh891711/seismology_ch1/main/photos/1.1-3.png" alt="Elastic Rebound Theory" class="w-full max-w-2xl rounded-lg bg-white p-4 shadow-inner">
                            <p class="text-xs text-slate-500 mt-4">由 H.F. Reid 提出：解釋應力累積至破裂的週期性過程</p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                            <div class="bg-slate-800/80 p-4 rounded-lg border-l-4 border-slate-500">
                                <span class="block text-slate-400 font-bold mb-1">(a) 原始狀態</span>
                                <p class="text-slate-300">岩層平衡，彈性應變為零。斷層兩側尚未產生位移。</p>
                            </div>
                            <div class="bg-slate-800/80 p-4 rounded-lg border-l-4 border-yellow-500">
                                <span class="block text-yellow-500 font-bold mb-1">(b) 蓄力變形</span>
                                <p class="text-slate-300">受板塊擠壓，岩石像彈簧般彎曲，能量以<span class="text-white">彈性應變能</span>形式儲存。</p>
                            </div>
                            <div class="bg-slate-800/80 p-4 rounded-lg border-l-4 border-red-500">
                                <span class="block text-red-500 font-bold mb-1">(c) 破裂回跳</span>
                                <p class="text-slate-300">應力超過摩擦力，岩層斷裂並<span class="text-white">回跳</span>平直。儲存的能量轉化為地震波。</p>
                            </div>
                        </div>

                        <div class="mt-8 p-6 bg-blue-900/10 rounded-xl border border-blue-900/40">
                            <h5 class="text-blue-400 font-bold mb-2 text-sm">理論價值與挑戰</h5>
                            <p class="text-sm text-slate-400 leading-relaxed italic">
                                雖然我們知道能量在累積（b階段），但「破裂點」的精確時刻極難預測。地震學家觀察 (c) 階段的位移，利用「反演」技術回推 (b) 階段累積了多少應力。
                            </p>
                        </div>
                    </div>
                </div>
                `,
                quiz: "如果一個斷層的滑動量（Offset）非常驚人，這代表在理論中的哪個階段累積了更多能量？",
                ans: "代表在 (b) 蓄力階段累積了極大的應力與變形。回跳的位移越大，代表釋放的地震矩 $M_0$ 越高，震級也就越大。"
            },
            {
                title: "2. 地球內部結構與波相",
                subtitle: "Earth Interior and Phases",
                q: "如何利用波相確認地球核心是液態？",
                explain: "S波（剪力波）無法在流體中傳播。地震學家發現 S波傳入地函底部後會消失或轉化，從而確認外核為液態。",
                quiz: "震央對面 143 度以外收不到 P 波直接波嗎？",
                ans: "可以收到，但會產生折射，形成 P 波影區邊界。S 波則是完全無法穿透。"
            },
            {
                title: "3. 反演問題與不確定性",
                subtitle: "Inverse Problems and Uncertainty",
                q: "為什麼不同的模型可以解釋同一組數據？",
                explain: "這就是「非唯一性」。由於測站分佈有限，多種構造模型可能導向相同的走時結果。",
                quiz: "如何降低反演的不確定性？",
                ans: "引入更多獨立觀測數據（如重力、地磁）或增加全球寬頻觀測網的密度。"
            },
            {
                title: "4. 板塊構造與典範轉移",
                subtitle: "Plate Tectonics and Paradigms",
                q: "地震分佈如何證明板塊邊界？",
                explain: "地震並非隨機發生，而是集中在狹窄的帶狀區域。這些區域正是板塊互相推擠、張裂或錯動的邊界。",
                quiz: "中洋脊發生的地震通常比較深還是淺？",
                ans: "通常較淺，因為那裡是熱的新生地殼張裂處。"
            },
            {
                title: "5. 核武監測與鑑別",
                subtitle: "Nuclear Test Monitoring",
                q: "如何分辨是炸彈還是斷層？",
                explain: "核爆是向外的全向擠壓，產生極大的 P 波（$m_b$ 高）；地震是斷層剪力錯動，產生較明顯的表面波（$M_s$ 高）。",
                visual: `<div class="mt-4 bg-white p-4 rounded-xl"><img src="https://raw.githubusercontent.com/minh891711/seismology_ch1/main/photos/1.1-1.png" class="mx-auto max-w-sm"></div>`,
                quiz: "辨別核爆的最關鍵參數是什麼？",
                ans: "$m_b$ 與 $M_s$ 的比值（體波規模與表面波規模的比值）。"
            }
        ];

        const container = document.getElementById('topics-container');
        const nav = document.getElementById('sidebar-nav');

        // 生成內容與索引
        topics.forEach((topic, index) => {
            const topicId = `topic-${index}`;
            
            // 生成內容
            container.innerHTML += `
                <div id="${topicId}" class="bg-slate-800 rounded-2xl shadow-xl border border-slate-700 overflow-hidden mb-8 scroll-mt-24">
                    <div class="px-8 py-6 bg-slate-800 flex justify-between items-center cursor-pointer hover:bg-slate-700/50 transition-colors" onclick="toggleAccordion('${topicId}')">
                        <div>
                            <h2 class="text-xl md:text-2xl font-black text-slate-100">${topic.title}</h2>
                            <p class="text-xs text-slate-400 font-medium tracking-wide uppercase">${topic.subtitle}</p>
                        </div>
                        <span id="icon-${topicId}" class="text-xl text-slate-500 transition-transform">+</span>
                    </div>
                    <div id="content-${topicId}" class="topic-content px-8 pb-8">
                        <div class="border-t border-slate-700 pt-6">
                            <h3 class="text-lg font-bold text-blue-400 mb-4">${topic.q}</h3>
                            <p class="text-slate-300 leading-relaxed">${topic.explain}</p>
                            ${topic.visual ? topic.visual : ''}
                            <div class="mt-8 bg-slate-900/50 p-6 rounded-xl border border-slate-700">
                                <p class="text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Master Challenge</p>
                                <p class="text-slate-200 mb-4 font-medium">${topic.quiz}</p>
                                <button onclick="toggleAnswer('ans-${topicId}')" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black py-2 px-6 rounded-full transition-all uppercase tracking-tighter">Reveal Answer</button>
                                <div id="ans-${topicId}" class="quiz-answer mt-4 p-4 bg-blue-900/20 rounded-lg text-blue-300 border border-blue-900/30 text-sm">
                                    ${topic.ans}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // 生成左側導航連結
            nav.innerHTML += `
                <a href="#${topicId}" class="nav-link block py-2 px-3 border-l-2 border-transparent hover:text-blue-400 hover:bg-slate-800 transition-all">
                    ${topic.title}
                </a>
            `;
        });

        function toggleAccordion(id) {
            const content = document.getElementById(`content-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            content.classList.toggle('open');
            icon.style.transform = content.classList.contains('open') ? 'rotate(45deg)' : 'rotate(0deg)';
        }

        function toggleAnswer(id) {
            document.getElementById(id).classList.toggle('show');
        }

        // ScrollSpy 邏輯
        const navLinks = document.querySelectorAll('.nav-link');
        const sections = document.querySelectorAll('div[id^="topic-"]');

        window.addEventListener('scroll', () => {
            let current = "";
            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= sectionTop - 150) {
                    current = section.getAttribute('id');
                }
            });

            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href').includes(current)) {
                    link.classList.add('active');
                }
            });
        });
        
        // 預設展開第一項
        toggleAccordion('topic-0');
    </script>
</body>
</html>
