    <!-- 設定 MathJax 支援內聯數學符號 $...$ -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        
        /* P波與S波的動畫設計 (深色模式適配) */
        .wave-container { overflow: hidden; position: relative; width: 100%; height: 80px; background: #1e293b; border-radius: 0.5rem; margin-top: 1rem; border: 1px solid #334155; display: flex; align-items: center;}
        
        /* P波 (壓縮波) 動畫 */
        .p-wave-dots { display: flex; width: 200%; animation: pWaveAnim 3s infinite linear; }
        .p-dot { width: 6px; height: 40px; background-color: #60a5fa; margin-right: 15px; border-radius: 3px; }
        .p-dot.compressed { margin-right: 4px; background-color: #f87171; }
        
        @keyframes pWaveAnim {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* S波 (剪力波) 動畫 */
        .s-wave-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: sWaveAnim 4s linear infinite;
        }
        @keyframes sWaveAnim {
            to { stroke-dashoffset: 0; }
        }

        /* 互動卡片動畫 */
        .topic-content { transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out; max-height: 0; opacity: 0; overflow: hidden; }
        .topic-content.open { max-height: 4000px; opacity: 1; padding-top: 1.5rem; }
        
        /* 隱藏解答 */
        .quiz-answer { display: none; }
        .quiz-answer.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

                            </ul>
                        </div>
                        
                        <div class="border-t border-slate-700/50 pt-4">
                            <h5 class="text-lg font-bold text-blue-400 mb-2">2. 兩群數據的差異與分布</h5>
                            <p class="mb-2">圖中明顯可以看出數據被分為兩個不重疊的群體：</p>
                            <ul class="list-disc pl-5 space-y-2 text-sm md:text-base">
                                <li><strong class="text-red-400">上方群體 (Nevada nuclear test / 內華達核爆)：</strong>在相同的總能量（或相同的表面波規模 $M_s$）下，核爆的體波規模 ($m_b$) 明顯偏高。</li>
                                <li><strong class="text-emerald-400">下方群體 (Western US earthquake / 美國西部地震)：</strong>在相同的體波規模下，自然地震會產生較大的表面波 ($M_s$)。</li>
                            </ul>
                        </div>

                        <div class="border-t border-slate-700/50 pt-4">
                            <h5 class="text-lg font-bold text-blue-400 mb-2">3. 背後的物理機制</h5>
                            <p class="mb-2">為什麼核爆和地震會在圖表上產生如此明顯的分野？這與它們的震源機制 (Source Mechanism) 有關：</p>
                            <ul class="list-disc pl-5 space-y-3 text-sm md:text-base">
                                <li><strong class="text-slate-100">核子試爆 (點源爆炸)：</strong>核爆發生在地下一個非常集中的點，爆炸瞬間會產生極大且均勻向外擴張的壓力（純壓縮）。這種機制會激發出非常強大的 P波 (體波)，但相較之下，產生的剪力波 (S波) 和表面波就微弱很多。因此，核爆的 $m_b$ 值會異常地高。</li>
                                <li><strong class="text-slate-100">自然地震 (斷層錯動)：</strong>地震是地殼板塊沿著斷層面發生錯動（剪切滑動）。這種大面積、具方向性的撕裂過程，會產生大量的剪力波 (S波) 與後續強大的表面波。因此，相對於其產生的 P波，地震的表面波規模 ($M_s$) 會大得多。</li>
                            </ul>
                        </div>

                        <div class="border-t border-slate-700/50 pt-4 bg-blue-900/20 p-4 rounded-lg mt-4 border border-blue-900/50">
                            <h5 class="text-lg font-bold text-blue-300 mb-2">4. 實際應用價值</h5>
                            <p class="text-sm md:text-base leading-relaxed">
                                這個 $m_b$ 與 $M_s$ 的比較圖 (稱為 $m_b : M_s$ discriminant)，是國際核子試爆監測與條約驗證 (Nuclear monitoring and treaty verification) 的核心技術之一。透過地震儀網路收集數據並繪製這張圖，科學家可以在不靠近現場的情況下，遠端判別某個地下震動事件是大自然的產物，還是某個國家正在進行秘密的地下核武測試。
                            </p>
                        </div>
                    </div>
                </div>
                `,
                quiz: "如果你在地震圖上看到一個信號，一開始的 P 波超級巨大，但後面幾乎沒有什麼搖晃的波，你猜這是地震還是爆炸？",
                ans: "這是爆炸的特徵！P波極強但缺乏表面波與S波，這就是地震學家用來監測核試驗的關鍵秘訣。"
            }
        ];

        const container = document.getElementById('topics-container');

        topics.forEach((topic, index) => {
            const topicId = `topic-${index}`;
            const html = `
                <div class="bg-slate-800 rounded-xl shadow-lg border border-slate-700 overflow-hidden hover:border-slate-600 transition-colors">
                    <button class="w-full px-6 py-5 text-left flex justify-between items-center bg-slate-800 hover:bg-slate-750 focus:outline-none" onclick="toggleAccordion('${topicId}')">
                        <div class="flex items-center gap-4">
                            <div>
                                <h2 class="text-xl font-bold text-slate-100">${topic.title}</h2>
                                <p class="text-xs font-medium text-slate-400 mt-1">${topic.subtitle}</p>
                            </div>
                        </div>
                        <span id="icon-${topicId}" class="text-2xl text-slate-400 transition-transform duration-300 ml-4 font-mono">+</span>
                    </button>
                    
                    <div id="${topicId}" class="topic-content px-6 pb-6 bg-slate-800/50">
                        <div class="border-t border-slate-700 pt-5">
                            <h3 class="text-lg font-bold text-indigo-400 mb-3">核心探討：${topic.q}</h3>
                            <p class="text-slate-300 leading-relaxed mb-4">${topic.explain}</p>
                            
                            ${topic.visual ? topic.visual : ''}

                            <div class="mt-8 bg-blue-950/30 border border-blue-900/50 rounded-xl p-5">
                                <h4 class="font-bold text-blue-400 mb-2">隨堂小測驗</h4>
                                <p class="text-slate-300 mb-4">${topic.quiz}</p>
                                <button onclick="toggleAnswer('ans-${topicId}')" class="bg-blue-600/80 hover:bg-blue-500 text-white text-sm font-semibold py-2 px-5 rounded-lg transition-colors border border-blue-500/50 shadow-sm">
                                    看大師解答
                                </button>
                                <div id="ans-${topicId}" class="quiz-answer mt-4 p-4 bg-emerald-950/30 rounded-lg border border-emerald-800/50 text-emerald-300 font-medium leading-relaxed">
                                    <span class="font-bold text-emerald-400">解答：</span>${topic.ans}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += html;
        });

        // 確保動態生成的數學符號被 MathJax 渲染
        if (window.MathJax) {
            MathJax.typesetPromise();
        }

        // 手風琴開關邏輯
        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.style.transform = 'rotate(0deg)';
                icon.innerText = '+';
            } else {
                content.classList.add('open');
                icon.style.transform = 'rotate(45deg)';
                // 為了視覺一致，旋轉 '+' 就會變成 'x'，因此不改變內部文字
            }
        }

        // 隨堂小測驗解答開關邏輯
        function toggleAnswer(id) {
            const ansElement = document.getElementById(id);
            if(ansElement.classList.contains('show')) {
                ansElement.classList.remove('show');
            } else {
                ansElement.classList.add('show');
            }
        }
    </script>
</body>
</html>
