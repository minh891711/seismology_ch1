<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震學大師互動教室 | 探索大地的奧秘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        
        /* P波與S波的動畫設計 */
        .wave-container { overflow: hidden; position: relative; width: 100%; height: 80px; background: #f8fafc; border-radius: 0.5rem; margin-top: 1rem; border: 1px solid #e2e8f0; display: flex; align-items: center;}
        
        /* P波 (壓縮波) 動畫 */
        .p-wave-dots { display: flex; width: 200%; animation: pWaveAnim 3s infinite linear; }
        .p-dot { width: 6px; height: 40px; background-color: #3b82f6; margin-right: 15px; border-radius: 3px; }
        .p-dot.compressed { margin-right: 4px; background-color: #ef4444; }
        
        @keyframes pWaveAnim {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* S波 (剪力波) 動畫 */
        .s-wave-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: sWaveAnim 4s linear infinite;
        }
        @keyframes sWaveAnim {
            to { stroke-dashoffset: 0; }
        }

        /* 互動卡片動畫 */
        .topic-content { transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out; max-height: 0; opacity: 0; overflow: hidden; }
        .topic-content.open { max-height: 2000px; opacity: 1; padding-top: 1.5rem; }
        
        /* 隱藏解答 */
        .quiz-answer { display: none; }
        .quiz-answer.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

        <div class="mt-8 bg-white/20 backdrop-blur-sm rounded-xl p-4 max-w-3xl mx-auto inline-block text-left border border-white/30">

                                <div id="ans-${topicId}" class="quiz-answer mt-3 p-3 bg-white rounded border border-green-200 text-green-800 font-medium">
                                    ✨ <b>解答：</b>${topic.ans}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += html;
        });

        // 手風琴開關邏輯
        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(`icon-${id}`);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.style.transform = 'rotate(0deg)';
                icon.innerText = '➕';
            } else {
                content.classList.add('open');
                icon.style.transform = 'rotate(45deg)';
                icon.innerText = '✖';
            }
        }

        // 隨堂小測驗解答開關邏輯
        function toggleAnswer(id) {
            const ansElement = document.getElementById(id);
            if(ansElement.classList.contains('show')) {
                ansElement.classList.remove('show');
            } else {
                ansElement.classList.add('show');
            }
        }
    </script>
</body>
</html>
